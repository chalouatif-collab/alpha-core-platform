<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Gate System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <span class="text-2xl">⚡</span>
            <h1 class="text-xl font-black text-emerald-400 tracking-wider">ALPHA <span class="text-white font-light">CORE</span></h1>
        </div>
        <div id="user-status-bar" class="hidden flex items-center gap-4">
            <div class="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg flex items-center gap-2">
                <span class="text-emerald-400 font-bold" id="nav-balance">$0.00</span>
                <span class="text-xs bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded font-mono">USDT</span>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="font-bold text-slate-300" id="nav-username">Guest</span>
            </div>
            <button onclick="logout()" class="text-sm bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white px-3 py-1.5 rounded-lg transition-all duration-200 cursor-pointer">خروج</button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col justify-center items-center">
        
        <section id="auth-section" class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl transition-all duration-300">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-white mb-2">بوابة التحكم والولوج</h2>
                <p class="text-sm text-slate-400">سجل دخولك لإدارة محفظتك والوصول للألعاب</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 block mb-1 font-medium">اسم المستخدم</label>
                    <input type="text" id="auth-username" placeholder="fethi" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-emerald-500 transition-all text-left font-mono">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1 font-medium">كلمة المرور</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-emerald-500 transition-all text-left font-mono">
                </div>
                
                <div class="flex gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-emerald-500/10">تسجيل الدخول</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-medium p-3 rounded-xl transition-all cursor-pointer border border-slate-700">إنشاء حساب</button>
                </div>
            </div>
        </section>

        <section id="main-dashboard" class="hidden w-full space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl">
                    <h3 class="text-slate-400 text-xs font-bold mb-1">صافي ربح المنصة (GGR)</h3>
                    <p class="text-2xl font-black text-cyan-400 font-mono">$0.00</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl">
                    <h3 class="text-slate-400 text-xs font-bold mb-1">إجمالي المدفوعات</h3>
                    <p class="text-2xl font-black text-amber-400 font-mono">$0.00</p>
                </div>
                
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl flex flex-col justify-between">
                    <div>
                        <h3 class="text-slate-400 text-xs font-bold mb-2">⚙️ إعدادات هامش الإدارة (Admin)</h3>
                        <input type="number" id="admin-margin-input" placeholder="10" class="w-full p-2 text-sm rounded bg-slate-800 border border-slate-700 text-white text-center font-mono">
                    </div>
                    <button onclick="saveAdminSettings()" class="w-full mt-3 bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-bold py-2 rounded-lg transition-all cursor-pointer">تطبيق الإعدادات</button>
                    
                    <div style="background-color: #1e293b; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #334155;">
                        <h4 style="color: #ffffff; font-size: 13px; font-weight: bold; margin-bottom: 8px;">💰 إدارة أرصدة اللاعبين</h4>
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <input type="text" id="admin-target-user" placeholder="اسم المستخدم (مثال: fethi)" style="padding: 6px; font-size: 12px; background-color: #334155; color: white; border: 1px solid #475569; border-radius: 6px; text-align: center;">
                            <input type="number" id="admin-balance-amount" placeholder="المبلغ للشحن" style="padding: 6px; font-size: 12px; background-color: #334155; color: white; border: 1px solid #475569; border-radius: 6px; text-align: center;">
                            <div style="display: flex; gap: 6px; margin-top: 2px;">
                                <button onclick="handleAdminBalance('charge')" style="flex: 1; background-color: #10b981; color: white; font-size: 12px; font-weight: bold; padding: 6px; border: none; border-radius: 4px; cursor: pointer;">💵 شحن</button>
                                <button onclick="handleAdminBalance('reset')" style="flex: 1; background-color: #f43f5e; color: white; font-size: 12px; font-weight: bold; padding: 6px; border: none; border-radius: 4px; cursor: pointer;">❌ تصفير</button>
                            </div>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl text-center">
                <h3 class="text-xl font-bold text-white mb-4">🎰 صالة الألعاب الرقمية</h3>
                <div class="p-8 bg-slate-950 border border-slate-800 rounded-xl max-w-sm mx-auto">
                    <p class="text-3xl font-black text-emerald-400 tracking-widest mb-6 font-mono" id="game-screen">READY</p>
                    <input type="number" id="game-bet-amount" value="10" class="w-24 p-2 rounded bg-slate-800 border border-slate-700 text-white text-center font-mono text-lg mb-4 block mx-auto">
                    <button onclick="playCasinoSpin()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black py-3 rounded-xl transition-all duration-200 cursor-pointer shadow-lg shadow-emerald-500/20 text-lg">SPIN (تدوير)</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-slate-950 text-center py-4 border-t border-slate-900 text-xs text-slate-500 font-mono">
        &copy; 2026 ALPHA CORE PLATFORM. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // رابط سيرفر الـ Backend العالمي على خادم Render الخاص بك
        const BACKEND_URL = "https://alpha-core-platform.onrender.com";
        let currentUser = null;

        // دالة معالجة الحسابات (الدخول والتسجيل) المحدثة
        async function handleAuth(mode) {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!username || !password) {
                alert('الرجاء إدخال اسم المستخدم وكلمة المرور!');
                return;
            }

            const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
            const btn = document.querySelector(`button[onclick="handleAuth('${mode}')"]`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ جاري الاتصال...';
            btn.disabled = true;

            try {
                const response = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('alpha_user', JSON.stringify(data.user || data));
                    currentUser = data.user || data;
                    
                    alert(mode === 'login' ? 'تم تسجيل الدخول بنجاح!' : 'تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.');
                    showSection('main-dashboard');
                    updateUI();
                } else {
                    alert(`خطأ: ${data.detail || 'فشلت العملية'}`);
                }
            } catch (error) {
                console.error('Auth Error:', error);
                alert('حدث خطأ أثناء الاتصال بالسيرفر السحابي، يرجى المحاولة مجدداً.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // دالة التحكم في أرصدة اللاعبين (الأدمن) لإرسال أوامر الشحن والتصفير للسيرفر
        async function handleAdminBalance(action) {
            const username = document.getElementById('admin-target-user').value.trim();
            const amountInput = document.getElementById('admin-balance-amount').value;
            
            if (!username) {
                alert('الرجاء إدخال اسم المستخدم أولاً!');
                return;
            }
            
            if (action === 'charge' && (!amountInput || amountInput <= 0)) {
                alert('الرجاء إدخال مبلغ صحيح للشحن!');
                return;
            }

            const amount = amountInput ? parseFloat(amountInput) : 0.0;

            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/update-balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, action, amount })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(`نجاح: ${result.message}. الرصيد الجديد للاعب ${result.username} هو: $${result.new_balance}`);
                    document.getElementById('admin-balance-amount').value = '';
                    
                    // إذا كان الأدمن يقوم بشحن حسابه الخاص، نحدث محفظته في شريط التنقل فوراً
                    if(currentUser && currentUser.username === username) {
                        currentUser.balance = result.new_balance;
                        updateUI();
                    }
                } else {
                    alert(`خطأ: ${result.detail || 'تعذر تحديث الرصيد'}`);
                }
            } catch (error) {
                console.error('Admin Balance Error:', error);
                alert('حدث خطأ أثناء الاتصال بالسيرفر، تأكد من تحديث ملف البايثون بنجاح!');
            }
        }

        // دالة تشغيل كازينو سبيّن (Casino Spin) والتواصل مع السيرفر السحابي
        async function playCasinoSpin() {
            if (!currentUser) return alert('برجاء تسجيل الدخول أولاً!');
            const betAmount = parseFloat(document.getElementById('game-bet-amount').value);
            if (isNaN(betAmount) || betAmount <= 0) return alert('برجاء إدخال مبلغ رهان صحيح!');

            const screen = document.getElementById('game-screen');
            screen.innerHTML = '🎰 SPINNING...';

            try {
                // محاكاة سريعة أو يمكنك ربطها بمسار كازينو حقيقي في السيرفر إذا كان لديك
                setTimeout(() => {
                    const win = Math.random() > 0.6; // نسبة فوز عشوائية للتجربة
                    if (win) {
                        currentUser.balance += betAmount * 2;
                        screen.innerHTML = '🎉 WIN!!';
                        screen.className = "text-3xl font-black text-amber-400 tracking-widest mb-6 font-mono animate-bounce";
                    } else {
                        currentUser.balance -= betAmount;
                        screen.innerHTML = '❌ LOSE';
                        screen.className = "text-3xl font-black text-rose-500 tracking-widest mb-6 font-mono";
                    }
                    updateUI();
                }, 1000);
            } catch (error) {
                screen.innerHTML = 'READY';
                alert('حدث خطأ في اللعبة!');
            }
        }

        // دالة تحديث عناصر الواجهة الرسومية (UI) بالبيانات الجديدة
        function updateUI() {
            if (currentUser) {
                document.getElementById('user-status-bar').classList.remove('hidden');
                document.getElementById('nav-username').innerHTML = currentUser.username;
                document.getElementById('nav-balance').innerHTML = `$${parseFloat(currentUser.balance).toFixed(2)}`;
            } else {
                document.getElementById('user-status-bar').classList.add('hidden');
            }
        }

        // دالة التنقل والتبديل بين الأقسام والصفحات
        function showSection(sectionId) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById(sectionId).classList.remove('hidden');
        }

        // دالة حفظ إعدادات الهامش العادية للأدمن
        function saveAdminSettings() {
            const margin = document.getElementById('admin-margin-input').value;
            alert(`تم حفظ هامش الإدارة عند: ${margin}%`);
        }

        // دالة الخروج من الحساب وتصفير الكاش
        function logout() {
            localStorage.removeItem('alpha_user');
            currentUser = null;
            updateUI();
            showSection('auth-section');
        }

        // فحص تلقائي عند فتح الصفحة: لو كان المستخدم مسجلاً من قبل، يدخل فوراً
        window.onload = function() {
            const savedUser = localStorage.getItem('alpha_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showSection('main-dashboard');
                updateUI();
            }
        }
    </script>
</body>
</html>
